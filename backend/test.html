<!DOCTYPE html>
<html>
<head>
    <title>LearnGenie Generator Test</title>

    <!-- Mermaid JS -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f9;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .section {
            margin-top: 30px;
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        pre {
            background: #222;
            color: #0f0;
            padding: 10px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h2>LearnGenie Generator Test</h2>

<input id="topic" placeholder="Topic (Required)">
<textarea id="description" placeholder="Optional description / focus points"></textarea>
<input id="duration" placeholder="Duration (optional)" type="number">

<button onclick="generate()">Generate</button>

<div class="section">
    <h3>Time Distribution</h3>
    <pre id="time"></pre>
</div>

<div class="section">
    <h3>Notes</h3>
    <pre id="notes"></pre>
</div>

<div class="section">
    <h3>Activity</h3>
    <pre id="activity"></pre>
</div>

<div class="section">
    <h3>Flowchart</h3>
    <div id="flowchart"></div>
</div>

<script>
mermaid.initialize({ startOnLoad: false });

async function generate() {

    const data = {
        topic: document.getElementById("topic").value,
        description: document.getElementById("description").value,
        duration_minutes: document.getElementById("duration").value
            ? parseInt(document.getElementById("duration").value)
            : null
    };

    const response = await fetch("http://127.0.0.1:8000/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    // Time Distribution
    document.getElementById("time").textContent =
        JSON.stringify(result.time_distribution, null, 2);

    // Notes
    document.getElementById("notes").textContent = result.notes;

    // Activity
    document.getElementById("activity").textContent =
        JSON.stringify(result.activity, null, 2);

    // Flowchart (Mermaid Render)
    document.getElementById("flowchart").innerHTML =
        `<div class="mermaid">flowchart TD
        ${result.flowchart.split("→").map((step, i, arr) => 
            i < arr.length - 1 
            ? `N${i}[${step.trim()}] --> N${i+1}[${arr[i+1].trim()}]` 
            : ''
        ).join('\n')}
        </div>`;

    mermaid.init(undefined, document.querySelectorAll(".mermaid"));
}
</script>

</body>
</html>

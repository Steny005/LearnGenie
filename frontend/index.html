<!DOCTYPE html>
<html>
<head>

<title>LearnGenie</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

<style>

body{
font-family: Arial;
padding:40px;
background:#f5f6fa;
}

textarea{
width:600px;
height:120px;
}

button{
padding:10px 20px;
margin-top:10px;
}

#output{
margin-top:30px;
white-space:pre-wrap;
}

#output svg {
    max-width: 700px;
    height: auto;
    display: block;
    margin-top: 20px;
}

#downloadBtn {
  display: none;
  margin-top: 20px;
  background: #27ae60;
  color: white;
  border: none;
  padding: 12px 24px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
  font-size: 16px;
  transition: background 0.3s;
}

#downloadBtn:hover {
  background: #219150;
}

</style>

</head>

<body>

<h1>LearnGenie</h1>

<p>
Enter topic or commands like:
<br>
<b>Photosynthesis</b> (Generates notes)
<br>
<b>Photosynthesis @flowchart</b> (or "Photosynthesis flowchart")
<br>
<b>Photosynthesis @activities</b> (or "Photosynthesis activity")
</p>

<textarea id="topic"></textarea>

<br><br>

Duration (minutes):

<input id="duration" type="number" value="45">

<button id="generateBtn" onclick="generate()">Generate</button>

<span id="loading" style="display:none; margin-left:10px;">
Generating...
</span>
<br><br>
<input type="file" id="pdfFile" accept=".pdf">
<button onclick="uploadPDF()">Upload PDF</button>


<div id="output"></div>
<button id="downloadBtn" onclick="downloadAsSVG()">📥 Download Flowchart (SVG)</button>

<script>

   async function uploadPDF(){

const fileInput = document.getElementById("pdfFile")

if(fileInput.files.length === 0){
alert("Please select a PDF file")
return
}

const file = fileInput.files[0]

const formData = new FormData()
formData.append("file", file)

try{

const response = await fetch("http://127.0.0.1:8000/upload_pdf",{
method:"POST",
body:formData
})

const data = await response.json()

document.getElementById("topic").value = data.topic_text

}catch(error){

console.error(error)
alert("PDF upload failed")

}

}

mermaid.initialize({startOnLoad:false})
async function generate(){

const topic=document.getElementById("topic").value
const duration=parseInt(document.getElementById("duration").value)

const button=document.getElementById("generateBtn")
const loading=document.getElementById("loading")
const output=document.getElementById("output")
const downloadBtn=document.getElementById("downloadBtn")

if(!topic.trim()){
alert("Please enter a topic")
return
}

// disable button
button.disabled=true
loading.style.display="inline"
output.innerHTML=""
downloadBtn.style.display="none"

try{

const response = await fetch("http://127.0.0.1:8000/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:topic,duration:duration})
})


const data=await response.json()

if(!response.ok){
  throw new Error(data.detail || "Server error")
}

if(data.type==="notes"){

output.textContent=data.data

}

if(data.type==="activity"){

output.textContent=data.data

}

if(data.type==="flowchart"){

let mermaidCode="flowchart TD\n"

data.data.nodes.forEach(node=>{
mermaidCode+=`${node.id}["${node.text}"]\n`
})

data.data.edges.forEach(edge=>{
mermaidCode+=`${edge.from_node} --> ${edge.to_node}\n`
})

const renderId = "chart_" + Date.now();
let svg;
try {
  const result = await mermaid.render(renderId, mermaidCode);
  svg = result.svg;
  svg = svg.replace("<svg", "<svg style='background:white'");
} catch (renderErr) {
  throw new Error("Mermaid render failed: " + renderErr.message);
}

output.innerHTML=svg
downloadBtn.style.display="inline-block"

}

}catch(err){

output.textContent="⚠️ Error: " + err.message
console.error(err)

}

// enable button again
button.disabled=false
loading.style.display="none"

}

function downloadAsSVG() {

    const svgElement = document.querySelector("#output svg");

    if (!svgElement) {
        alert("Generate a flowchart first.");
        return;
    }
    const clone = svgElement.cloneNode(true);

    // shrink diagram size
    clone.setAttribute("width", "800");
    clone.setAttribute("height", "600");
    const serializer = new XMLSerializer();
    let svgData = serializer.serializeToString(svgElement);

    const blob = new Blob([svgData], { type: "image/svg+xml" });

    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "learngenie-flowchart.svg";

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
